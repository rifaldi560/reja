<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calle Clothing - Premium POS System</title>
    <style>
        /* --- ROOT & GLOBAL STYLE --- */
        :root {
            --primary: #2c3e50;
            --accent: #d4af37;
            --danger: #e74c3c;
            --success: #27ae60;
            --bg: #f4f7f6;
            --white: #ffffff;
        }

        body { 
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); 
            margin: 0; padding: 40px 20px; 
            display: flex; justify-content: center;
            color: #333;
        }

        .main-container { 
            display: flex; gap: 30px; max-width: 1100px; width: 100%; 
            align-items: flex-start;
        }
        
        /* --- CARD STYLE --- */
        .card { 
            background: var(--white); padding: 35px; border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); flex: 1.2; 
        }

        h2 { text-align: center; color: var(--primary); letter-spacing: 4px; margin-bottom: 30px; font-weight: 800; }
        h3 { font-size: 1.1rem; color: var(--primary); border-left: 5px solid var(--accent); padding-left: 12px; margin-bottom: 20px; }

        label { display: block; margin: 15px 0 8px; font-weight: 600; color: #555; font-size: 0.85rem; }
        
        select, input { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #ddd; 
            background: #fafafa; transition: 0.3s; font-size: 1rem; box-sizing: border-box;
        }
        
        select:focus, input:focus { outline: none; border-color: var(--accent); background: #fff; }
        
        /* --- BUTTONS --- */
        .btn-add { 
            background-color: var(--primary); color: white; border: none; 
            padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; 
            margin-top: 25px; width: 100%; transition: 0.3s; font-size: 1rem;
        }
        .btn-add:hover { background-color: #1a252f; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .btn-checkout { 
            background-color: var(--success); color: white; border: none; 
            padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; 
            width: 100%; margin-top: 25px; font-size: 1rem; transition: 0.3s;
        }
        .btn-checkout:hover { background-color: #219150; }

        .btn-del { color: var(--danger); background: #fff1f0; border: none; cursor: pointer; 
                    width: 30px; height: 30px; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn-del:hover { background: var(--danger); color: white; }

        /* --- TABLE --- */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 0.75rem; color: #999; text-transform: uppercase; padding: 10px 0; border-bottom: 1px solid #eee; }
        td { padding: 15px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.95rem; }
        
        /* --- STRUK / RECEIPT --- */
        #struk { 
            background: var(--white); padding: 35px; border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); flex: 0.8; 
            display: none; position: sticky; top: 40px;
            animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideIn { from { opacity:0; transform: translateX(30px); } to { opacity:1; transform: translateX(0); } }
        .fade-out { animation: fadeOut 0.5s forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(20px); } }

        .line { border-top: 1px dashed #ccc; margin: 15px 0; }
        .total-akhir { font-size: 1.6rem; font-weight: 800; color: var(--primary); text-align: right; margin: 15px 0; }
        
        .btn-reset { 
            background-color: #f1f2f6; color: #5f27cd; border: none; 
            padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; 
            width: 100%; margin-top: 15px; transition: 0.3s;
        }
        .btn-reset:hover { background-color: #dfe4ea; color: #2e1266; }

        /* --- MODAL DIALOG --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 20px; text-align: center;
            width: 320px; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: popUp 0.3s ease;
        }
        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-btns { display: flex; gap: 10px; margin-top: 25px; }
        .btn-yes { background: var(--danger); color: white; border: none; padding: 12px; flex: 1; border-radius: 10px; cursor: pointer; font-weight: 700; }
        .btn-no { background: #eee; color: #555; border: none; padding: 12px; flex: 1; border-radius: 10px; cursor: pointer; }

    </style>
</head>
<body>

<div class="main-container">
    <div class="card">
        <h2>CALLE</h2>
        
        <h3>Pilih Produk</h3>
        <label>Katalog Koleksi</label>
        <select id="produk">
            <option value="749000">Gamis Calle - Rp 749.000</option>
            <option value="349000">T-Shirt American Dream - Rp 349.000</option>
            <option value="429000">Backhit Blue Denim - Rp 429.000</option>
        </select>

        <div style="display: flex; gap: 20px;">
            <div style="flex: 1;">
                <label>Ukuran</label>
                <select id="size">
                    <option>M</option><option>L</option><option>XL</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>Jumlah</label>
                <input type="number" id="jumlah" value="1" min="1">
            </div>
        </div>

        <button class="btn-add" onclick="tambahKeKeranjang()">Tambah ke Keranjang</button>

        <div style="margin-top: 50px;">
            <h3>Keranjang Belanja</h3>
            <table id="tabelKeranjang">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Subtotal</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
            <button class="btn-checkout" id="btnProses" style="display:none;" onclick="cetakStruk()">Proses Pembayaran</button>
        </div>
    </div>

    <div id="struk">
        <div style="text-align: center;">
            <h2 style="margin-bottom: 5px; font-size: 1.2rem;">CALLE CLOTHING</h2>
            <p style="font-size: 0.75rem; color: #888; margin: 0;">Jakarta, Indonesia | www.calle.com</p>
        </div>
        
        <div class="line"></div>
        <div id="isiStruk"></div>
        <div class="line"></div>
        
        <div class="total-akhir">
            <div style="font-size: 0.7rem; color: #999; font-weight: normal; text-transform: uppercase;">Total Pembayaran</div>
            Rp <span id="grandTotal">0</span>
        </div>
        
        <div class="line"></div>
        <p style="text-align: center; font-size: 0.7rem; color: #777; line-height: 1.5;">
            Terima kasih telah memilih koleksi kami.<br>
            Stay Stylish with Calle.
        </p>
        
        <button class="btn-reset" onclick="bukaModalReset()">Buat Transaksi Baru</button>
    </div>
</div>

<div id="modalReset" class="modal-overlay">
    <div class="modal-content">
        <div style="font-size: 3rem; margin-bottom: 15px;">♻️</div>
        <h4 style="margin: 0; font-size: 1.2rem;">Hapus Transaksi?</h4>
        <p style="font-size: 0.85rem; color: #777;">Tindakan ini akan menghapus semua item di keranjang.</p>
        <div class="modal-btns">
            <button class="btn-no" onclick="tutupModal()">Batal</button>
            <button class="btn-yes" onclick="konfirmasiReset()">Ya, Hapus</button>
        </div>
    </div>
</div>

<script>
    let keranjang = [];

    // 1. TAMBAH ITEM
    function tambahKeKeranjang() {
        const produkSelect = document.getElementById('produk');
        const namaProduk = produkSelect.options[produkSelect.selectedIndex].text.split(' - ')[0];
        const harga = parseInt(produkSelect.value);
        const size = document.getElementById('size').value;
        const jumlah = parseInt(document.getElementById('jumlah').value);

        if (jumlah < 1 || isNaN(jumlah)) {
            alert("Masukkan jumlah produk yang valid!");
            return;
        }

        // Simpan data
        keranjang.push({
            namaProduk,
            size,
            jumlah,
            harga,
            subtotal: harga * jumlah
        });

        updateUI();
        // Reset input jumlah ke 1 setelah tambah
        document.getElementById('jumlah').value = 1;
    }

    // 2. HAPUS SATU ITEM
    function hapusItem(index) {
        keranjang.splice(index, 1);
        updateUI();
    }

    // 3. UPDATE TAMPILAN TABEL
    function updateUI() {
        const tbody = document.querySelector("#tabelKeranjang tbody");
        const btnProses = document.getElementById('btnProses');
        tbody.innerHTML = "";

        keranjang.forEach((item, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>
                        <div style="font-weight: 700;">${item.namaProduk}</div>
                        <div style="font-size: 0.75rem; color: #888;">Size: ${item.size}</div>
                    </td>
                    <td>${item.jumlah}</td>
                    <td>Rp ${item.subtotal.toLocaleString('id-ID')}</td>
                    <td style="text-align: right;">
                        <button class="btn-del" onclick="hapusItem(${index})">&times;</button>
                    </td>
                </tr>`;
        });

        // Tampilkan tombol proses jika ada barang
        btnProses.style.display = keranjang.length > 0 ? "block" : "none";
    }

    // 4. CETAK STRUK
    function cetakStruk() {
        const isiStruk = document.getElementById('isiStruk');
        const strukDiv = document.getElementById('struk');
        let total = 0;
        isiStruk.innerHTML = "";

        keranjang.forEach(item => {
            isiStruk.innerHTML += `
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.9rem;">
                    <div>
                        <b>${item.namaProduk}</b> (${item.size})<br>
                        <small>${item.jumlah} x Rp ${item.harga.toLocaleString('id-ID')}</small>
                    </div>
                    <div style="font-weight: 600;">Rp ${item.subtotal.toLocaleString('id-ID')}</div>
                </div>`;
            total += item.subtotal;
        });

        document.getElementById('grandTotal').innerText = total.toLocaleString('id-ID');
        strukDiv.style.display = 'block';
        
        // Scroll otomatis ke struk agar terlihat di HP
        strukDiv.scrollIntoView({ behavior: 'smooth' });
    }

    // 5. LOGIKA RESET DENGAN MODAL
    function bukaModalReset() {
        document.getElementById('modalReset').style.display = 'flex';
    }

    function tutupModal() {
        document.getElementById('modalReset').style.display = 'none';
    }

    function konfirmasiReset() {
        const struk = document.getElementById('struk');
        
        // Animasi keluar
        struk.classList.add('fade-out');

        setTimeout(() => {
            keranjang = [];
            updateUI();
            struk.style.display = 'none';
            struk.classList.remove('fade-out');
            tutupModal();
        }, 500);
    }
</script>

</body>
</html>
